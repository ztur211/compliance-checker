services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: compliance
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DB_URL: jdbc:postgresql://db:5432/compliance
      DB_USER: compliance
      DB_PASSWORD: compliance
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  dbdata:
